server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Real HTTP 404 for any path that doesn't exist as a file or directory.
    # /xx/ or /home/ now return 404 instead of a 200 + SPA shell duplicate.
    error_page 404 /404.html;

    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|webp|avif|wasm)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}