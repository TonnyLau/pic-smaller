server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Per-locale static HTML. /en-US/ → /en-US.html, /zh-TW/ → /zh-TW.html, etc.
    # The prerender step in scripts/prerender-locales.mjs writes one HTML file
    # per locale into dist/. This block must come before the catch-all `location /`
    # so locale URLs resolve to the localized head (correct <html lang>, title,
    # description, canonical, hreflang, OG, Twitter, JSON-LD) on first paint,
    # before the React app hydrates. SEO headers go here so every prerendered
    # HTML carries the same X-Robots-Tag and Vary signal.
    location ~ "^/(en-US|zh-TW|ja-JP|ko-KR|fr-FR|es-ES|tr-TR|fa-IR)/?$" {
        set $locale_file $1.html;
        add_header X-Robots-Tag "index, follow, max-image-preview:large, max-snippet:-1" always;
        add_header Vary "Accept-Language" always;
        try_files /$locale_file =404;
    }

    # SPA shell — only root. Locale URLs are handled above; everything else
    # (assets, deep-links) is served from the filesystem or falls back here
    # so the React router can render the 404 page client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Real HTTP 404 for any path that doesn't exist as a file or directory.
    # /xx/ or /home/ now return 404 instead of a 200 + SPA shell duplicate.
    # `=404` on the error_page preserves the 404 status code (otherwise nginx
    # returns 200 with the 404 body, which Google treats as soft-404).
    error_page 404 =404 /404.html;

    # SEO headers for the default root document. Locale-specific pages
    # already receive the same headers in their location block above.
    location = /index.html {
        add_header X-Robots-Tag "index, follow, max-image-preview:large, max-snippet:-1" always;
        add_header Vary "Accept-Language" always;
    }

    # Prerendered per-locale HTML (e.g. /en-US.html when someone strips the
    # trailing slash). Same SEO headers as the directory-served variant.
    location ~ "^/[a-z]{2}-[A-Z]{2}\.html$" {
        add_header X-Robots-Tag "index, follow, max-image-preview:large, max-snippet:-1" always;
        add_header Vary "Accept-Language" always;
    }

    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|webp|avif|wasm)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
